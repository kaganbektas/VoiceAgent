server {
    listen 80;
    server_name voiceagent.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name voiceagent.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/voiceagent.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voiceagent.yourdomain.com/privkey.pem;

    # Frontend (Landing + Dashboard SPA)
    root /var/www/voiceagent/frontend;
    index index.html;

    # API Proxy
    location /api/ {
        proxy_pass http://localhost:5119/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Twilio WebSocket endpoint
    location /ws {
        proxy_pass http://localhost:5119/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # React SPA - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
